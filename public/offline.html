<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — TechMart KE</title>
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/pwa/favicon-32.png" type="image/png">
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #FFFFFF;
            color: #1D1D1F;
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .logo {
            width: 64px;
            height: 64px;
            background: #000;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .logo svg { width: 32px; height: 32px; color: #fff; }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        p {
            color: #86868B;
            max-width: 360px;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        .btn:hover { background: #1D1D1F; }
        .btn:active { transform: scale(0.98); }
        .tip {
            margin-top: 2rem;
            padding: 1rem 1.25rem;
            background: #F5F5F7;
            border-radius: 1rem;
            max-width: 360px;
            font-size: 0.8rem;
            color: #86868B;
            text-align: left;
        }
        .tip strong { color: #1D1D1F; }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #86868B;
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/>
            </svg>
        </div>
        <h1>You're offline</h1>
        <p>
            <span class="dot"></span>No internet connection detected.
            Some pages you've already visited may still work.
        </p>
        <button class="btn" onclick="location.reload()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
            Try again
        </button>
        <div class="tip">
            <strong>TechMart KE</strong> — Once you're back online, you'll get full access to browse phones, laptops, trade-in tools, and more.
        </div>
    </div>

    <script>
        // Auto-retry when network comes back
        window.addEventListener('online', () => {
            setTimeout(() => location.reload(), 500);
        });
    </script>
</body>
</html>
